global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "spark-master"
    static_configs:
      - targets: ["spark-master:8081"]
    metrics_path: /metrics/prometheus
    scrape_interval: 30s

  - job_name: "spark-workers"
    static_configs:
      - targets:
          - "spark-worker-1:8081"
          - "spark-worker-2:8081"
          - "spark-worker-3:8081"
    metrics_path: /metrics/prometheus
    scrape_interval: 30s

  - job_name: "grafana"
    static_configs:
      - targets: ["grafana:3000"]
    metrics_path: /metrics
    scrape_interval: 60s
